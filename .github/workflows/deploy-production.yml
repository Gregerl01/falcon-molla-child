name: Deploy to Production (Hostinger)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Trust Hostinger SSH host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 65002 92.112.191.78 >> ~/.ssh/known_hosts

      - name: Deploy theme to Hostinger (production)
        run: |
          rsync -avz --delete \
            --exclude=".git*" \
            -e "ssh -p 65002" \
            ./ \
            u772682663@92.112.191.78:/home/u772682663/domains/falconbodies.com/public_html/wp-content/themes/molla-child/
