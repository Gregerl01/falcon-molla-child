name: Deploy to Production (Hostinger) — DISABLED

# This workflow has been intentionally neutralized as Phase 0 of the
# deploy-hardening rework.
#
# The previous version (commit aba09a6, 2026-04-06) used an empty
# PROD_DEPLOY_PATH secret as the rsync target. Combined with
# `rsync --delete`, this expanded to the user's home directory and
# wiped all 10 sites on the Hostinger account.
#
# A safe replacement is being authored on the `dev` branch under the
# 10-layer architecture and will land via PR. Until then, this stub
# prevents any push to `main` from triggering a deploy.
#
# Do not edit this file directly on `main`. The replacement comes
# from `dev` and supersedes this stub in full.
#
# The staging workflow (deploy-staging.yml) is unaffected. It
# only fires on pushes to the `staging` branch, which is
# unrelated to this time-bomb path.

on:
  workflow_dispatch:

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - name: Stub
        run: |
          echo "Production deploy workflow is currently disabled."
          echo "Phase 0 stub — see the dev branch for the safe replacement in progress."
          exit 0
